<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPS Explorer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
    <header>
        <h1>BPS Explorer</h1>
        <p class="subtitle">Jelajahi Dynamic Data & Static Table dari Web API BPS — dijalankan lokal</p>
    </header>

    <section class="card">
        <div class="field">
            <label>API Key BPS</label>
            <input type="password" id="api_key" placeholder="Masukkan API Key BPS Anda">
            <span class="hint">Key tidak disimpan di server, hanya dipakai saat request berjalan.</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="dynamic">Dynamic Data</button>
            <button class="tab-btn" data-tab="static">Static Table</button>
        </div>

        <div id="tab-dynamic" class="tab-content">
            <div class="field-row">
                <div class="field">
                    <label>Tipe Domain</label>
                    <select id="domain_type">
                        <option value="all">Semua (Nasional + Provinsi)</option>
                        <option value="prov">Provinsi</option>
                        <option value="kabbyprov">Kabupaten/Kota (per Provinsi)</option>
                    </select>
                </div>
                <div class="field" id="prov_picker_wrap" style="display:none">
                    <label>Pilih Provinsi Induk</label>
                    <select id="prov_picker"></select>
                </div>
                <div class="field">
                    <label>Domain</label>
                    <select id="domain"></select>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Kategori Subjek</label>
                    <select id="subcat"><option value="">-- Semua --</option></select>
                </div>
                <div class="field">
                    <label>Subjek</label>
                    <select id="subject"><option value="">-- Pilih Kategori Dulu --</option></select>
                </div>
                <div class="field">
                    <label>Variabel</label>
                    <select id="variable"><option value="">-- Pilih Subjek Dulu --</option></select>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Wilayah/Rincian (vervar)</label>
                    <select id="vervar" multiple size="4"></select>
                </div>
                <div class="field">
                    <label>Rincian Turunan (turvar, opsional)</label>
                    <select id="turvar" multiple size="4"></select>
                </div>
                <div class="field">
                    <label>Tahun</label>
                    <select id="tahun" multiple size="4"></select>
                </div>
            </div>

            <button id="fetch-data-btn">Ambil Data</button>
            <div id="status-dynamic" class="status"></div>

            <div id="results-dynamic" style="display:none">
                <div class="results-header">
                    <h2>Hasil (<span id="result-count">0</span> baris)</h2>
                    <div class="export-buttons">
                        <a href="/api/export/csv" class="btn-export">Export CSV</a>
                        <a href="/api/export/xlsx" class="btn-export">Export Excel</a>
                        <a href="/api/export/json" class="btn-export">Export JSON</a>
                    </div>
                </div>
                <div class="table-wrap">
                    <table id="data-table">
                        <thead>
                            <tr><th>Wilayah</th><th>Variabel</th><th>Rincian</th><th>Tahun</th><th>Nilai</th><th>Unit</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-static" class="tab-content" style="display:none">
            <div class="field-row">
                <div class="field">
                    <label>Domain</label>
                    <select id="st_domain"></select>
                </div>
                <div class="field">
                    <label>Keyword</label>
                    <input type="text" id="st_keyword" placeholder="mis. inflasi">
                </div>
                <div class="field">
                    <label>Tahun</label>
                    <input type="number" id="st_year" placeholder="2024">
                </div>
            </div>
            <button id="fetch-static-btn">Cari Static Table</button>
            <div id="status-static" class="status"></div>

            <div id="results-static" style="display:none">
                <div class="table-wrap">
                    <table id="static-table">
                        <thead><tr><th>Judul</th><th>Ukuran</th><th>Update</th><th>Excel</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>

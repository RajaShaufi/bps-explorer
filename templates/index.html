<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPS Explorer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
    <header>
        <h1>BPS Explorer</h1>
        <p class="subtitle">Jelajahi & unduh data BPS lintas domain — dijalankan lokal</p>
    </header>

    <section class="card">
        <div class="field-row">
            <div class="field">
                <label>API Key BPS</label>
                <input type="password" id="api_key" placeholder="Masukkan API Key BPS Anda">
            </div>
            <div class="field">
                <label>Tipe Domain</label>
                <select id="domain_type">
                    <option value="all">Semua (Nasional + Provinsi)</option>
                    <option value="prov">Provinsi</option>
                    <option value="kabbyprov">Kabupaten/Kota (per Provinsi)</option>
                </select>
            </div>
            <div class="field" id="prov_picker_wrap" style="display:none">
                <label>Provinsi Induk</label>
                <select id="prov_picker"></select>
            </div>
            <div class="field">
                <label>Domain</label>
                <select id="domain"></select>
            </div>
        </div>
        <span class="hint">Key tidak disimpan di server, hanya dipakai saat request berjalan.</span>
    </section>

    <section class="card">
        <h2 style="margin-top:0">Statistik menurut Subjek</h2>
        <div class="layout-sidebar">
            <aside class="sidebar" id="csa-sidebar">
                <div class="sidebar-item special" id="search-all-node">🔍 Cari Semua Tabel</div>
                <div id="csa-tree"><span class="hint">Isi API key & pilih domain dulu.</span></div>
            </aside>

            <main class="main-panel">
                <div id="subject-search-box" class="field" style="display:none">
                    <input type="text" id="global_keyword" placeholder="Cari judul tabel (mis. inflasi)...">
                    <button id="global-search-btn">Cari</button>
                </div>

                <div class="toolbar">
                    <h2 id="subject-title">Pilih subjek di samping</h2>
                    <div class="toolbar-actions">
                        <input type="text" id="filter-box" placeholder="Filter judul yang tampil...">
                        <button id="select-all-btn">Pilih Semua</button>
                        <button id="copy-titles-btn">Copy Semua Judul</button>
                        <button id="download-selected-btn" class="primary">Download Terpilih</button>
                    </div>
                </div>
                <div id="status-subject" class="status"></div>

                <div class="table-wrap">
                    <table id="tables-table">
                        <thead>
                            <tr>
                                <th style="width:30px"><input type="checkbox" id="check-all-header"></th>
                                <th>Judul</th>
                                <th style="width:110px">Update</th>
                                <th style="width:90px">Ukuran</th>
                                <th style="width:110px">Unduh</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </main>
        </div>
    </section>
</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
